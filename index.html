<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Boda Yacqui & Sergio</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/page-flip/dist/js/page-flip.browser.min.js"></script>
</head>

<body>

<!-- 🌿 FLORES PREMIUM -->
<img src="flores-top-left.jpg" class="floral tl">
<img src="flores-top-right.png" class="floral tr">
<img src="flores-bottom-left.png" class="floral bl">
<img src="flores-bottom-right.png" class="floral br">

<header>
  <h1>Yacqui & Sergio</h1>
  <p>03 · Octubre · 2026</p>
</header>

<div class="container">

  <!-- 📖 LIBRO -->
  <div id="book" class="book">

    <div class="page"><img src="1.png"></div>
    <div class="page"><img src="2.png"></div>

  </div>

  <!-- CONTROLES -->
  <div class="controls">
    <button id="prev">⬅</button>
    <button id="next">➡</button>
  </div>

  <div class="formulario">
    Confirma tu asistencia en el
    <a href="https://forms.gle/F862XggiaJDcb5yc9" target="_blank">formulario</a>
  </div>

  <audio id="music" loop>
    <source src="musica.m4a" type="audio/mp4">
  </audio>

  <button id="playMusic">🎵 Play</button>

</div>

<footer>Con mucho cariño ❤️</footer>

<script>
const bookElement = document.getElementById("book");

/* 📖 LIBRO PREMIUM */
const pageFlip = new PageFlip(bookElement, {
    width: 340,
    height: 480,
    size: "fixed",
    showCover: true,
    mobileScrollSupport: true,
    useMouseEvents: true,
    flippingTime: 1000,
    maxShadowOpacity: 0.5
});

/* carga páginas */
pageFlip.loadFromHTML(document.querySelectorAll(".page"));

/* botones */
document.getElementById("next").addEventListener("click", () => pageFlip.flipNext());
document.getElementById("prev").addEventListener("click", () => pageFlip.flipPrev());

/* 🎵 música */
const music = document.getElementById("music");
document.getElementById("playMusic").addEventListener("click", async () => {
    try {
        await music.play();
        document.getElementById("playMusic").style.display = "none";
    } catch (e) {
        console.log(e);
    }
});

/* ✨ apertura animada tipo revista */
window.addEventListener("load", () => {
    setTimeout(() => {
        pageFlip.flipNext();
        setTimeout(() => pageFlip.flipPrev(), 1200); // de 600 → 1200ms
    }, 1200); // de 800 → 1200ms
});
</script>

</body>
</html>
