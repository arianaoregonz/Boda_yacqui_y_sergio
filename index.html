<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Boda Yacqui & Sergio</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>Yacqui & Sergio</h1>
    <p>03 · Octubre · 2026</p>
  </header>

  <div class="container">

    <iframe class="pdf" src="Boda.pdf"></iframe>

    <div class="formulario">
      Confirma tu asistencia en el siguiente
      <a href="https://forms.gle/F862XggiaJDcb5yc9" target="_blank">
        formulario
      </a>
    </div>

    <audio id="music" loop>
      <source src="musica.m4a" type="audio/mp4">
    </audio>

    <button id="playMusic">
      🎵 Play
    </button>

  </div>

  <footer>
    Con mucho cariño ❤️
  </footer>

  <script>
    const button = document.getElementById("playMusic");
    const music = document.getElementById("music");

    button.addEventListener("click", () => {
      music.play();
      button.style.display = "none";
    });
  </script>

</body>
</html>
