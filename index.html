<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boda Yacqui & Sergio</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/page-flip/dist/js/page-flip.browser.min.js"></script>
</head>

<body>

<!-- 🌿 FLORES PREMIUM (PNG realistas) -->
<img src="flores-bottom-left.png" class="floral tl">
<img src="flores-bottom-right.png" class="floral tr">
<img src="flores-top-left.png" class="floral bl">
<img src="flores-top-right.png" class="floral br">

<header>
  <h1>Yacqui & Sergio</h1>
  <p>03 · Octubre · 2026</p>
</header>

<div class="container">

  <div id="book" class="book">

    <div class="page"><img src="paginas/1.jpg"></div>
    <div class="page"><img src="paginas/2.jpg"></div>
    <div class="page"><img src="paginas/3.jpg"></div>
    <div class="page"><img src="paginas/4.jpg"></div>

  </div>

  <div class="controls">
    <button id="prev">⬅</button>
    <button id="next">➡</button>
  </div>

  <div class="formulario">
    Confirma tu asistencia en el
    <a href="https://forms.gle/F862XggiaJDcb5yc9" target="_blank">formulario</a>
  </div>

  <audio id="music" loop>
    <source src="musica.m4a" type="audio/mp4">
  </audio>

  <audio id="flipSound">
    <source src="page-flip.mp3" type="audio/mp3">
  </audio>

  <button id="playMusic">🎵 Play</button>

</div>

<footer>Con mucho cariño ❤️</footer>

<script>
const flipSound = document.getElementById("flipSound");

const pageFlip = new St.PageFlip(document.getElementById("book"), {
  width: 440,
  height: 620,
  size: "stretch",
  showCover: true,
  useMouseEvents: true,
  swipeDistance: 30,
  flippingTime: 900
});

pageFlip.loadFromHTML(document.querySelectorAll(".page"));

// sonido al pasar página
pageFlip.on("flip", () => {
  flipSound.currentTime = 0;
  flipSound.play();
});

document.getElementById("next").addEventListener("click", () => pageFlip.flipNext());
document.getElementById("prev").addEventListener("click", () => pageFlip.flipPrev());

// música
const music = document.getElementById("music");
document.getElementById("playMusic").addEventListener("click", () => {
  music.play();
  document.getElementById("playMusic").style.display = "none";
});
</script>

</body>
</html>
