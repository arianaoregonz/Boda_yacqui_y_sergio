<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tenemos algo que contarte...</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Georgia', serif;
    text-align: center;
    color: #0cc0df;
    background: radial-gradient(circle at top, #fffdf8, #f3ece3);
    overflow-x: hidden;
    min-height: 100vh;
}

.floral {
    position: fixed;
    width: 240px;
    opacity: 0.85;
    z-index: 1;
    pointer-events: none;
    animation: float 6s ease-in-out infinite;
}
.tl { top:-10px; left:-10px; }
.tr { top:-10px; right:-10px; transform:scaleX(-1); }
.bl { bottom:-10px; left:-10px; transform:scaleY(-1); }
.br { bottom:-10px; right:-10px; transform:scale(-1); }
@keyframes float {
    0%,100% { transform:translateY(0); }
    50% { transform:translateY(10px); }
}

header { padding: 40px 20px 15px; position: relative; z-index: 2; }
header h1 {
    font-size: 3.2rem;
    background: linear-gradient(90deg, #0cc0df, #A7FCEC, #0cc0df);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
header p { color: #0cc0df; margin-top: 6px; }

.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 2;
    padding-bottom: 60px;
}

/* VISOR */
.book-wrapper {
    position: relative;
    width: 340px;
    margin: 20px auto;
}

.page-container {
    position: relative;
    width: 340px;
}

/* Página 1: relativa, da altura al contenedor */
.page-1 {
    position: relative;
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    border: 1px solid rgba(66,215,235,0.3);
    backface-visibility: hidden;
    transition: transform 0.7s cubic-bezier(0.645, 0.045, 0.355, 1.000), opacity 0.7s ease;
    transform: rotateY(0deg);
    opacity: 1;
    z-index: 2;
}

/* Página 2: absoluta encima */
.page-2 {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    border: 1px solid rgba(66,215,235,0.3);
    backface-visibility: hidden;
    transition: transform 0.7s cubic-bezier(0.645, 0.045, 0.355, 1.000), opacity 0.7s ease;
    transform: rotateY(180deg);
    opacity: 0;
    z-index: 1;
}

.page-1 img, .page-2 img {
    width: 100%;
    height: auto;
    display: block;
}

/* Cuando se muestra página 2 */
.show-page2 .page-1 {
    transform: rotateY(-180deg);
    opacity: 0;
    z-index: 1;
}
.show-page2 .page-2 {
    transform: rotateY(0deg);
    opacity: 1;
    z-index: 2;
}

/* INDICADORES */
.page-indicator {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin: 12px 0;
}
.dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(66,215,235,0.3);
    transition: background 0.3s;
    cursor: pointer;
}
.dot.active { background: #0cc0df; }

/* CONTROLES */
.controls {
    display: flex;
    gap: 16px;
    margin: 8px 0 20px;
}
.controls button {
    padding: 12px 28px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #A7FCEC, #0cc0df);
    color: white;
    cursor: pointer;
    font-size: 1.1rem;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    transition: transform 0.2s, opacity 0.2s;
}
.controls button:hover { transform: scale(1.07); }
.controls button:disabled { opacity: 0.3; cursor: default; transform: none; }

.formulario {
    margin-top: 10px;
    font-size: 1.2rem;
    color: #0cc0df;
}
.formulario a {
    color: #0cc0df;
    border-bottom: 2px solid #0cc0df;
    text-decoration: none;
    font-weight: bold;
}

/* Indicador de música (sutil, sin botón) */
#musicNote {
    margin-top: 16px;
    font-size: 1.4rem;
    opacity: 0;
    animation: fadeNote 2s ease 2s forwards;
}
@keyframes fadeNote {
    0%   { opacity: 0; transform: translateY(4px); }
    50%  { opacity: 1; transform: translateY(0); }
    100% { opacity: 0.5; }
}

footer {
    margin: 30px 0 20px;
    color: #7a6656;
    position: relative;
    z-index: 2;
}

.countdown {
    margin-top: 30px;
}
.countdown-titulo {
    font-size: 1rem;
    color: #0cc0df;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
}
.countdown-bloques {
    display: flex;
    gap: 16px;
    justify-content: center;
}
.bloque {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: rgba(66, 215, 235, 0.1);
    border: 1px solid rgba(66, 215, 235, 0.3);
    border-radius: 12px;
    padding: 14px 18px;
    min-width: 70px;
}
.bloque span {
    font-size: 2rem;
    font-weight: bold;
    color: #0cc0df;
    line-height: 1;
}
.bloque small {
    font-size: 0.7rem;
    color: #0cc0df;
    opacity: 0.7;
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

@media (max-width: 600px) {
    header h1 { font-size: 2.4rem; }
    .floral { width: 140px; }
    .book-wrapper, .page-container { width: 88vw; }
}
</style>
</head>
<body>

<img src="flores-top-left.png"    class="floral tl">
<img src="flores-top-right.png"   class="floral tr">
<img src="flores-bottom-left.png" class="floral bl">
<img src="flores-bottom-right.png" class="floral br">

<header>
    <h1>Tenemos algo que contarte...</h1>
</header>

<div class="container">

    <div class="book-wrapper">
        <div class="page-container" id="pageContainer">
            <div class="page-1">
                <img src="1.png" alt="Invitación - Página 1">
            </div>
            <div class="page-2">
                <img src="2.png" alt="Invitación - Página 2">
            </div>
        </div>
    </div>

    <div class="page-indicator">
        <div class="dot active" id="dot1" onclick="goToPage(1)"></div>
        <div class="dot"        id="dot2" onclick="goToPage(2)"></div>
    </div>

    <div class="controls">
        <button id="prev" onclick="prevPage()" disabled>⬅</button>
        <button id="next" onclick="nextPage()">➡</button>
    </div>

    <div class="formulario">
        Confirma tu asistencia en el
        <a href="https://forms.gle/F862XggiaJDcb5yc9" target="_blank">formulario</a>
    </div>
    
    <audio id="music" loop autoplay muted>
        <source src="musica.mp4" type="audio/mp4">
    </audio>

</div>

<footer>
    <div class="countdown">
        <p class="countdown-titulo">Faltan</p>
        <div class="countdown-bloques">
            <div class="bloque"><span id="dias">00</span><small>días</small></div>
            <div class="bloque"><span id="horas">00</span><small>horas</small></div>
            <div class="bloque"><span id="minutos">00</span><small>min</small></div>
            <div class="bloque"><span id="segundos">00</span><small>seg</small></div>
        </div>
    </div>
</footer>

<script>
let currentPage = 1;
const totalPages = 2;
const container = document.getElementById("pageContainer");

function updateUI() {
    document.getElementById("prev").disabled = (currentPage === 1);
    document.getElementById("next").disabled = (currentPage === totalPages);
    document.getElementById("dot1").classList.toggle("active", currentPage === 1);
    document.getElementById("dot2").classList.toggle("active", currentPage === 2);
    container.classList.toggle("show-page2", currentPage === 2);
}

function nextPage() { if (currentPage < totalPages) { currentPage++; updateUI(); } }
function prevPage() { if (currentPage > 1) { currentPage--; updateUI(); } }
function goToPage(n) { currentPage = n; updateUI(); }

/* Animación de bienvenida */
window.addEventListener("load", () => {
    setTimeout(() => {
        currentPage = 2; updateUI();
        setTimeout(() => { currentPage = 1; updateUI(); }, 1200);
    }, 1000);
});

/* ✅ Música: autoplay silenciado + desmutea al primer clic en cualquier sitio */
const music = document.getElementById("music");
music.load();

document.addEventListener("click", () => {
    if (music.muted) {
        music.muted = false;
        music.play().catch(() => {});
    }
}, { once: true });

/* Cuenta atrás */
function actualizarContador() {
    const boda = new Date("2026-10-03T13:00:00");
    const ahora = new Date();
    const diff = boda - ahora;

    if (diff <= 0) {
        document.querySelector(".countdown-titulo").textContent = "¡Hoy es el gran día! 🎉";
        return;
    }

    const dias    = Math.floor(diff / (1000 * 60 * 60 * 24));
    const horas   = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutos = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const segs    = Math.floor((diff % (1000 * 60)) / 1000);

    document.getElementById("dias").textContent     = String(dias).padStart(2, "0");
    document.getElementById("horas").textContent    = String(horas).padStart(2, "0");
    document.getElementById("minutos").textContent  = String(minutos).padStart(2, "0");
    document.getElementById("segundos").textContent = String(segs).padStart(2, "0");
}

actualizarContador();
setInterval(actualizarContador, 1000);

</script>
</body>
</html>
